
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#0e1726"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101b2d"/>
      <stop offset="100%" stop-color="#14233a"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4da3ff"/>
      <stop offset="100%" stop-color="#79b8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect x="30" y="30" width="1020" height="1860" rx="55" fill="url(#bgGrad)" stroke="#31435f" stroke-width="5"/>
  <rect x="430" y="55" width="220" height="25" rx="12" fill="#20314a"/>
  <text x="70" y="155" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="52" font-weight="700">Körningsdetaljer</text>
  <text x="70" y="200" fill="#a9bddc" font-family="DejaVu Sans, Arial" font-size="24">Utökad information utanför huvudvyn</text>

  <rect x="70" y="230" width="940" height="205" rx="28" fill="url(#panelGrad)" filter="url(#shadow)"/>
  <text x="95" y="295" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="34" font-weight="700">Hallsberg → Mjölby</text>
  <text x="95" y="350" fill="#a9bddc" font-family="DejaVu Sans, Arial" font-size="28">Tåg 120 km/h, 630 m, 1850 ton</text>
  <rect x="95" y="370" width="170" height="42" rx="14" fill="#1d3150"/><text x="120" y="398" fill="#79b8ff" font-family="DejaVu Sans, Arial" font-size="22">Aktiv körning</text>

  <rect x="70" y="470" width="940" height="500" rx="32" fill="url(#panelGrad)" filter="url(#shadow)"/>
  <text x="95" y="525" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="34" font-weight="700">Full profil</text>
  <text x="95" y="560" fill="#a9bddc" font-family="DejaVu Sans, Arial" font-size="22">Översikt över rutten som helhet</text>
  <polyline points="120,855 180,820 260,785 360,825 430,900 540,845 640,760 760,815 860,925 940,845" fill="none" stroke="#4da3ff" stroke-width="10" stroke-linecap="round" stroke-linejoin="round"/>
  <line x1="500" y1="620" x2="500" y2="915" stroke="#ffd166" stroke-width="4"/>

  <rect x="70" y="1010" width="940" height="620" rx="32" fill="url(#panelGrad)" filter="url(#shadow)"/>
  <text x="95" y="1065" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="34" font-weight="700">Kommande punkter</text>
  <rect x="95" y="1130" width="890" height="92" rx="20" fill="#1a2d4b"/>
  <text x="125" y="1187" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="28">Fall om 650 m</text>
  <rect x="95" y="1250" width="890" height="92" rx="20" fill="#1a2d4b"/>
  <text x="125" y="1307" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="28">Stigning om 2,1 km</text>
  <rect x="95" y="1370" width="890" height="92" rx="20" fill="#1a2d4b"/>
  <text x="125" y="1427" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="28">Driftplats Degerön om 6,4 km</text>
  <rect x="95" y="1490" width="890" height="92" rx="20" fill="#1a2d4b"/>
  <text x="125" y="1547" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="28">Större profilskifte om 8,0 km</text>

</svg>