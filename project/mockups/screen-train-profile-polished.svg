
<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1920" viewBox="0 0 1080 1920">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#08111d"/>
      <stop offset="100%" stop-color="#0e1726"/>
    </linearGradient>
    <linearGradient id="panelGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#101b2d"/>
      <stop offset="100%" stop-color="#14233a"/>
    </linearGradient>
    <linearGradient id="ctaGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#4da3ff"/>
      <stop offset="100%" stop-color="#79b8ff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="1080" height="1920" fill="url(#bgGrad)"/>
  <rect x="30" y="30" width="1020" height="1860" rx="55" fill="url(#bgGrad)" stroke="#31435f" stroke-width="5"/>
  <rect x="430" y="55" width="220" height="25" rx="12" fill="#20314a"/>
  <text x="70" y="155" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="52" font-weight="700">Tåguppgifter</text>
  <text x="70" y="200" fill="#a9bddc" font-family="DejaVu Sans, Arial" font-size="24">Grunddata för aktuell körning</text>

  <rect x="70" y="270" width="940" height="860" rx="30" fill="url(#panelGrad)" filter="url(#shadow)"/>
  <text x="100" y="355" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="30" font-weight="700">Maxhastighet</text>
  <rect x="100" y="385" width="880" height="96" rx="24" fill="#1a2d4b"/>
  <text x="130" y="446" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="30">120 km/h</text>
  <text x="100" y="565" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="30" font-weight="700">Tåglängd</text>
  <rect x="100" y="595" width="880" height="96" rx="24" fill="#1a2d4b"/>
  <text x="130" y="656" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="30">630 m</text>
  <text x="100" y="775" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="30" font-weight="700">Tågvikt</text>
  <rect x="100" y="805" width="880" height="96" rx="24" fill="#1a2d4b"/>
  <text x="130" y="866" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="30">1850 ton</text>
  <rect x="100" y="960" width="280" height="44" rx="14" fill="#1d3150"/>
  <text x="125" y="989" fill="#79b8ff" font-family="DejaVu Sans, Arial" font-size="22">Kan sparas som profil</text>
  <rect x="100" y="1180" width="880" height="112" rx="28" fill="url(#ctaGrad)" filter="url(#shadow)"/>
  <text x="330" y="1250" fill="white" font-family="DejaVu Sans, Arial" font-size="34" font-weight="700">Starta körning</text>

</svg>