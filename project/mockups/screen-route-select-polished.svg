  <rect x="230" y="795" width="170" height="42" rx="14" fill="#1d3150"/><text x="252" y="823" fill="#79b8ff" font-family="DejaVu Sans, Arial" font-size="22">Långprofil</text>
  <path d="M105 850 C 190 790, 300 810, 380 760 S 520 720, 650 790 S 800 860, 915 790" stroke="#ffd166" stroke-width="7" fill="none"/>
