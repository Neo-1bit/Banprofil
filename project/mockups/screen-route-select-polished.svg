  <text x="105" y="715" fill="#eef4ff" font-family="DejaVu Sans, Arial" font-size="36" font-weight="700">Mjölby → Nässjö</text>
  <text x="105" y="765" fill="#a9bddc" font-family="DejaVu Sans, Arial" font-size="26">Via Tranås</text>
