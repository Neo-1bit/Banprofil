  <rect x="105" y="535" width="110" height="42" rx="14" fill="#1d3150"/><text x="128" y="563" fill="#79b8ff" font-family="DejaVu Sans, Arial" font-size="22">83 km</text>
  <rect x="230" y="535" width="150" height="42" rx="14" fill="#1d3150"/><text x="257" y="563" fill="#79b8ff" font-family="DejaVu Sans, Arial" font-size="22">Ruttprofil</text>
  <path d="M105 590 C 180 565, 260 620, 340 590 S 500 540, 610 570 S 760 640, 900 520" stroke="#38d39f" stroke-width="7" fill="none"/>
